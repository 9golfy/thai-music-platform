services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: thai-music-web-prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://thai-music-mongo:27017/thai_music_school
      - MONGO_DB=thai_music_school
      - JWT_SECRET=thai_music_platform_super_secure_jwt_secret_2024
      - GMAIL_USER=thaimusicplatform@gmail.com
      - GMAIL_APP_PASSWORD=heqwnhneswksqlze
      - NEXT_PUBLIC_APP_URL=http://18.138.63.84:3000
    depends_on:
      - mongodb
    networks:
      - thai-music-network
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: thai-music-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=thai_music_school
    networks:
      - thai-music-network
    restart: unless-stopped

  mongo-express:
    image: mongo-express:1
    container_name: thai-music-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://thai-music-mongo:27017/
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
    depends_on:
      - mongodb
    networks:
      - thai-music-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  thai-music-network:
    driver: bridge
