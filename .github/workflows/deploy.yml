name: Deploy to Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    name: Trigger Webhook Deploy (164.115.41.34)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Webhook
        run: |
          echo "🚀 Triggering deployment webhook..."
          echo "📍 Server: 164.115.41.34 (dcpschool100.net)"
          echo "🌿 Branch: ${{ github.ref }}"
          echo "👤 Pushed by: ${{ github.actor }}"
          
          # Note: The actual deployment is handled by the webhook server on the server
          # GitHub automatically sends webhook notifications when code is pushed
          # This workflow just confirms the push was successful
          
          echo ""
          echo "✅ Code pushed successfully!"
          echo "🎣 Webhook server will receive notification and deploy automatically"
          echo ""
          echo "📋 Monitor deployment:"
          echo "   SSH to server: ssh root@164.115.41.34"
          echo "   Check logs: pm2 logs webhook-deploy"
          echo "   Check status: pm2 status"
          echo ""
          echo "🌐 Application URL: https://dcpschool100.net/"
            
      - name: Deployment Info
        run: |
          echo "ℹ️  Deployment Method: GitHub Webhook"
          echo ""
          echo "How it works:"
          echo "1. You push code to GitHub"
          echo "2. GitHub sends webhook notification to https://dcpschool100.net/webhook"
          echo "3. Webhook server on 164.115.41.34 receives notification"
          echo "4. Server automatically pulls code, builds, and restarts application"
          echo ""
          echo "To verify webhook is configured:"
          echo "https://github.com/${{ github.repository }}/settings/hooks"
