name: Build & Deploy to EC2 (ECR)

on:
  push:
    branches: ["master"]

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: 889976851669.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPOSITORY: thai-music-platform
  CONTAINER_NAME: thai-music-web
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        run: |
          docker build --no-cache -f Dockerfile.prod -t $ECR_REPOSITORY:${{ github.sha }} .
          docker tag $ECR_REPOSITORY:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker tag $ECR_REPOSITORY:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy on EC2 (compose pull & restart)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/registerForm-platform

            # Clean any local changes and untracked files
            git clean -fd
            git reset --hard HEAD
            
            # Pull latest code from repository
            git fetch origin
            git reset --hard origin/master
            
            # Verify we have the latest Dockerfile.prod
            echo "=== Current Dockerfile.prod content ==="
            head -30 Dockerfile.prod
            echo "=== End Dockerfile.prod ==="

            # Check if docker-compose.prod.yml exists
            if [ ! -f docker-compose.prod.yml ]; then
              echo "ERROR: docker-compose.prod.yml not found!"
              exit 1
            fi

            # Login to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

            # Stop and remove old containers
            docker compose -f docker-compose.prod.yml down || true

            # Clean Docker cache
            docker system prune -af

            # Build and start services
            docker compose -f docker-compose.prod.yml build --no-cache web
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Show status
            echo "=== Container Status ==="
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"

            # Show recent logs
            echo "=== Recent Logs ==="
            docker compose -f docker-compose.prod.yml logs --tail 50 web

            # Clean unused images
            docker image prune -f



