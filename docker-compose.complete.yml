version: '3.8'

services:
  # MongoDB with pre-loaded data
  mongodb:
    image: mongo:7
    container_name: thai-music-mongo-complete
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpass
      MONGO_INITDB_DATABASE: thai_music_school
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      - ./backups/local/thai_music_school:/docker-entrypoint-initdb.d/data:ro
    networks:
      - thai-music-network

  # Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile.complete
    container_name: thai-music-web-complete
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://root:rootpass@mongodb:27017/thai_music_school?authSource=admin
      - JWT_SECRET=thai-music-super-secret-jwt-key-2024
      - NEXTAUTH_SECRET=thai-music-nextauth-secret-2024
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - thai-music-network

  # MongoDB Express (Admin UI)
  mongo-express:
    image: mongo-express:1
    container_name: thai-music-mongo-express-complete
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: rootpass
      ME_CONFIG_MONGODB_URL: mongodb://root:rootpass@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb
    networks:
      - thai-music-network

volumes:
  mongodb_data:

networks:
  thai-music-network:
    driver: bridge